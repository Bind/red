services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # Skip install wizard
      - FORGEJO__security__INSTALL_LOCK=true
      # SQLite database
      - FORGEJO__database__DB_TYPE=sqlite3
      # Server config
      - FORGEJO__server__ROOT_URL=http://localhost:3001
      - FORGEJO__server__HTTP_PORT=3000
      # Enable push-to-create repos
      - FORGEJO__repository__ENABLE_PUSH_CREATE_USER=true
      - FORGEJO__repository__DEFAULT_PUSH_CREATE_PRIVATE=false
      # Disable registration (we create admin via CLI)
      - FORGEJO__service__DISABLE_REGISTRATION=true
      # Allow webhooks to local/private IPs (needed for dev)
      - FORGEJO__webhook__ALLOWED_HOST_LIST=*
    ports:
      - "3001:3000"   # Forgejo web UI
      - "2222:22"     # SSH (optional)
    volumes:
      - forgejo-data:/data

  redc-api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - forgejo
    env_file:
      - .env
    environment:
      REDC_PORT: ${REDC_PORT:-3000}
      REDC_DB_PATH: ${REDC_DB_PATH:-/data/redc-dev.db}
      FORGEJO_URL: ${FORGEJO_URL:-http://forgejo:3000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-secret-123}
      CODEX_RUNNER_IMAGE: ${CODEX_RUNNER_IMAGE:-redc-codex-runner}
      FETCH_REMOTE_AFTER_MERGE: ${FETCH_REMOTE_AFTER_MERGE:-}
    ports:
      - "3000:3000"
    working_dir: /app
    command: >
      sh -lc "bun install --frozen-lockfile &&
      bun run --watch src/index.ts"
    volumes:
      - .:/app
      - redc-node-modules:/app/node_modules
      - web-node-modules:/app/web/node_modules
      - redc-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.codex:/root/.codex:ro

  redc-web:
    image: oven/bun:1-alpine
    restart: unless-stopped
    depends_on:
      - redc-api
    working_dir: /app/web
    environment:
      VITE_API_PROXY_TARGET: http://redc-api:3000
    ports:
      - "5173:5173"
    command: >
      sh -lc "cd /app &&
      bun install --frozen-lockfile &&
      cd /app/web &&
      bun run dev --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
      - redc-node-modules:/app/node_modules
      - web-node-modules:/app/web/node_modules

volumes:
  forgejo-data:
  redc-data:
  redc-node-modules:
  web-node-modules:
