services:
  gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-gateway:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      API_HOST: api
      AUTH_HOST: auth
      BFF_HOST: bff
      OBS_HOST: obs
      TRIAGE_HOST: triage
      GRS_HOST: grs
      WEB_HOST: web
      MCP_HOST: mcp
    depends_on:
      - api
      - auth
      - bff
      - obs
      - triage
      - grs
      - web
      - mcp

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-api:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      REDC_PORT: 3000
      REDC_DB_PATH: /data/redc.db
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-s3}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-redc-artifacts}
      MINIO_PREFIX: ${MINIO_PREFIX:-claw-runs}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    volumes:
      - api-data:/data

  bff:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-bff:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      - api
      - auth
      - obs
      - grs
      - triage
      - mcp
    environment:
      BFF_PORT: 3001
      REDC_API_BASE_URL: http://api:3000
      AUTH_BASE_URL: http://auth:4020
      OBS_BASE_URL: http://obs:4090
      TRIAGE_BASE_URL: http://triage:7000
      GRS_BASE_URL: http://grs:8080
      MCP_BASE_URL: http://mcp:3002
      BFF_GIT_STORAGE_PUBLIC_URL: http://grs:8080
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

  auth:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-auth:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      - db-auth
    environment:
      AUTH_LAB_HOST: 0.0.0.0
      AUTH_LAB_PORT: 4020
      AUTH_LAB_AUDIENCE: ${AUTH_AUDIENCE:-redc-api}
      AUTH_LAB_DB_URL: postgres://${AUTH_DB_USER:-auth_lab}:${AUTH_DB_PASSWORD:-auth_lab_password}@db-auth:5432/${AUTH_DB_NAME:-auth_lab}
      AUTH_LAB_BOOTSTRAP_SCOPES: ${AUTH_BOOTSTRAP_SCOPES:-prs:create changes:read}
      AUTH_LAB_BOOTSTRAP_AUDIENCES: ${AUTH_BOOTSTRAP_AUDIENCES:-redc-api}
      AUTH_LAB_BOOTSTRAP_TTL_SECONDS: ${AUTH_BOOTSTRAP_TTL_SECONDS:-300}
      AUTH_LAB_ALLOW_ANY_TOTP_CODE: ${AUTH_ALLOW_ANY_TOTP_CODE:-false}
      AUTH_LAB_BETTER_AUTH_SECRET: ${AUTH_BETTER_AUTH_SECRET:?AUTH_BETTER_AUTH_SECRET is required}
      AUTH_LAB_SIGNING_PRIVATE_JWK: ${AUTH_LAB_SIGNING_PRIVATE_JWK:?AUTH_LAB_SIGNING_PRIVATE_JWK is required}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

  db-auth:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_lab}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_lab}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_lab_password}
    volumes:
      - db-auth-data:/var/lib/postgresql/data

  s3:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - s3-data:/data

  obs:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-obs:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      WIDE_EVENTS_HOST: 0.0.0.0
      WIDE_EVENTS_PORT: 4090
      WIDE_EVENTS_STORAGE_BACKEND: file
      WIDE_EVENTS_DATA_DIR: /data/wide-events
      WIDE_EVENTS_RAW_EVENTS_DIR: /data/wide-events/raw
      WIDE_EVENTS_ROLLUP_DIR: /data/wide-events/rollup
      WIDE_EVENTS_SWEEP_INTERVAL_MS: ${WIDE_EVENTS_SWEEP_INTERVAL_MS:-5000}
      WIDE_EVENTS_INCOMPLETE_GRACE_MS: ${WIDE_EVENTS_INCOMPLETE_GRACE_MS:-60000}
      WIDE_EVENTS_REPLAY_WINDOW_MS: ${WIDE_EVENTS_REPLAY_WINDOW_MS:-600000}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    volumes:
      - obs-data:/data

  grs:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-grs:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      - s3
    environment:
      GIT_SERVER_PORT: 8080
      GIT_SERVER_S3_ENDPOINT: http://s3:9000
      GIT_SERVER_S3_REGION: ${GIT_SERVER_S3_REGION:-us-east-1}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-grs-repos}
      GIT_SERVER_S3_PREFIX: ${GIT_SERVER_S3_PREFIX:-repos}
      GIT_SERVER_S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      GIT_SERVER_S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      GIT_SERVER_ADMIN_USERNAME: ${GIT_SERVER_ADMIN_USERNAME:-admin}
      GIT_SERVER_ADMIN_PASSWORD: ${GIT_SERVER_ADMIN_PASSWORD:-admin}
      GIT_SERVER_AUTH_TOKEN_SECRET: ${GIT_SERVER_AUTH_TOKEN_SECRET:-dev-git-server-secret}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

  triage:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-triage:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      - triage-smithers
    environment:
      TRIAGE_PORT: 7000
      TRIAGE_WORKFLOW_MODE: ${TRIAGE_WORKFLOW_MODE:-stub}
      TRIAGE_SMITHERS_BASE_URL: http://triage-smithers:7331
      TRIAGE_WORKFLOW_PATH: /app/apps/triage/src/workflows/triage.tsx
      TRIAGE_SMITHERS_DB_PATH: /smithers-data/smithers.db
      TRIAGE_AGENT_MODE: ${TRIAGE_AGENT_MODE:-openai-compatible}
      TRIAGE_OPENAI_BASE_URL: ${TRIAGE_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      TRIAGE_OPENAI_API_KEY: ${TRIAGE_OPENAI_API_KEY:-}
      TRIAGE_OPENAI_MODEL: ${TRIAGE_OPENAI_MODEL:-anthropic/claude-sonnet-4.5}
      TRIAGE_OPENAI_PROVIDER_NAME: ${TRIAGE_OPENAI_PROVIDER_NAME:-openrouter}
      TRIAGE_OPENAI_TITLE: ${TRIAGE_OPENAI_TITLE:-redc}
      TRIAGE_OPENAI_REFERER: ${TRIAGE_OPENAI_REFERER:-}
      SMITHERS_API_KEY: ${SMITHERS_API_KEY:-}
      REDC_API_BASE_URL: http://api:3000
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    volumes:
      - smithers-data:/smithers-data

  triage-smithers:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-triage:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    command: ["bun", "run", "apps/triage/src/smithers-server.ts"]
    environment:
      SMITHERS_SERVER_PORT: 7331
      SMITHERS_API_KEY: ${SMITHERS_API_KEY:-}
      SMITHERS_DB_PATH: /smithers-data/smithers.db
      SMITHERS_ROOT_DIR: /app
      TRIAGE_AGENT_MODE: ${TRIAGE_AGENT_MODE:-openai-compatible}
      TRIAGE_OPENAI_BASE_URL: ${TRIAGE_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      TRIAGE_OPENAI_API_KEY: ${TRIAGE_OPENAI_API_KEY:-}
      TRIAGE_OPENAI_MODEL: ${TRIAGE_OPENAI_MODEL:-anthropic/claude-sonnet-4.5}
      TRIAGE_OPENAI_PROVIDER_NAME: ${TRIAGE_OPENAI_PROVIDER_NAME:-openrouter}
      TRIAGE_OPENAI_TITLE: ${TRIAGE_OPENAI_TITLE:-redc}
      TRIAGE_OPENAI_REFERER: ${TRIAGE_OPENAI_REFERER:-}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    volumes:
      - smithers-data:/smithers-data

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-web:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped

  mcp:
    image: ${IMAGE_REGISTRY:-ghcr.io/bind}/red-mcp:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      - auth
    environment:
      MCP_PORT: 3002
      MCP_AUTH_BASE_URL: http://auth:4020
      MCP_OAUTH_CLIENT_ID: ${MCP_OAUTH_CLIENT_ID:-mcp}
      MCP_OAUTH_CLIENT_SECRET: ${MCP_OAUTH_CLIENT_SECRET:-}
      MCP_REQUIRED_SCOPE: ${MCP_REQUIRED_SCOPE:-mcp:read}
      MCP_DISABLE_AUTH: ${MCP_DISABLE_AUTH:-false}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}

volumes:
  api-data:
  db-auth-data:
  s3-data:
  obs-data:
  smithers-data:
