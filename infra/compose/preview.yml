# Per-PR preview stack. Brought up with COMPOSE_PROJECT_NAME=preview-<slug>
# so container names / docker DNS / volumes are all namespaced.
#
# `gateway` joins the external `preview-net` so the permanent Caddy in front
# of every preview can route `<slug>.preview.red.computer` to it.
#
# Scope note: only services with production Dockerfiles today (ctl, auth,
# grs) are included. bff / obs / triage / web will join when their
# Dockerfiles land. See docs/dev-preview.md.

name: ${COMPOSE_PROJECT_NAME:?COMPOSE_PROJECT_NAME is required (e.g. preview-pr-42)}

services:
  gateway:
    container_name: ${COMPOSE_PROJECT_NAME}-gateway
    build: ../gateway
    restart: unless-stopped
    environment:
      API_HOST: api
    networks:
      - default
      - preview-net
    depends_on:
      - api

  api:
    container_name: ${COMPOSE_PROJECT_NAME}-api
    build:
      context: ../..
      dockerfile: infra/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - api-data:/data
    networks:
      - default

  auth:
    container_name: ${COMPOSE_PROJECT_NAME}-auth
    build:
      context: ../../apps/auth
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db-auth
    environment:
      AUTH_LAB_HOST: 0.0.0.0
      AUTH_LAB_PORT: 4020
      AUTH_LAB_DB_URL: postgres://${AUTH_DB_USER:-auth_lab}:${AUTH_DB_PASSWORD:-auth_lab_password}@db-auth:5432/${AUTH_DB_NAME:-auth_lab}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    networks:
      - default

  db-auth:
    container_name: ${COMPOSE_PROJECT_NAME}-db-auth
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_lab}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_lab}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_lab_password}
    volumes:
      - db-auth-data:/var/lib/postgresql/data
    networks:
      - default

  s3:
    container_name: ${COMPOSE_PROJECT_NAME}-s3
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - s3-data:/data
    networks:
      - default

  grs:
    container_name: ${COMPOSE_PROJECT_NAME}-grs
    build:
      context: ../../apps/grs
      dockerfile: docker/gitty/Dockerfile
      args:
        GITTY_REF: ${GITTY_REF:-291bc674c5105ccb00b27273e7772cf6120149d5}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      - s3
    environment:
      GIT_SERVER_PORT: 8080
      GIT_SERVER_S3_ENDPOINT: http://s3:9000
      GIT_SERVER_S3_REGION: ${GIT_SERVER_S3_REGION:-us-east-1}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-grs-repos}
      GIT_SERVER_S3_PREFIX: ${GIT_SERVER_S3_PREFIX:-repos}
      GIT_SERVER_S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      GIT_SERVER_S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      GIT_SERVER_ADMIN_USERNAME: ${GIT_SERVER_ADMIN_USERNAME:-admin}
      GIT_SERVER_ADMIN_PASSWORD: ${GIT_SERVER_ADMIN_PASSWORD:-admin}
      GIT_SERVER_AUTH_TOKEN_SECRET: ${GIT_SERVER_AUTH_TOKEN_SECRET:-dev-git-server-secret}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    networks:
      - default

networks:
  preview-net:
    external: true
  default:
    driver: bridge

volumes:
  api-data:
  db-auth-data:
  s3-data:
