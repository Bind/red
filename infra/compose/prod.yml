# Production overlay. Apply on top of `infra/compose/runtime.yml`.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway

  api:
    env_file:
      - ../../.env

  bff:
    env_file:
      - ../../.env

  auth:
    env_file:
      - ../../.env
    environment:
      AUTH_LAB_ISSUER: ${AUTH_ISSUER:-https://red.computer}
      AUTH_LAB_WEB_CLIENTS: ${AUTH_WEB_CLIENTS:-redc-web=https://red.computer}
      AUTH_LAB_PASSKEY_ORIGINS: ${AUTH_PASSKEY_ORIGINS:-https://red.computer}
      AUTH_LAB_PASSKEY_RP_IDS: ${AUTH_PASSKEY_RP_IDS:-red.computer}
      AUTH_LAB_BOOTSTRAP_CLIENT_ID: ${AUTH_BOOTSTRAP_CLIENT_ID:-claw-runner-prod}
      AUTH_LAB_BOOTSTRAP_CLIENT_SECRET: ${AUTH_BOOTSTRAP_CLIENT_SECRET:-auth-lab-prod-client-secret}
      AUTH_LAB_EXPOSE_TEST_MAILBOX: ${AUTH_EXPOSE_TEST_MAILBOX:-false}

  grs:
    env_file:
      - ../../.env

  obs:
    env_file:
      - ../../.env

  triage:
    env_file:
      - ../../.env

  triage-smithers:
    env_file:
      - ../../.env

  mcp:
    env_file:
      - ../../.env

volumes:
  caddy-data:
  caddy-config:
