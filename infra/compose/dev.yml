services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # Skip install wizard
      - FORGEJO__security__INSTALL_LOCK=true
      # SQLite database
      - FORGEJO__database__DB_TYPE=sqlite3
      # Server config
      - FORGEJO__server__ROOT_URL=http://localhost:3001
      - FORGEJO__server__HTTP_PORT=3000
      # Enable push-to-create repos
      - FORGEJO__repository__ENABLE_PUSH_CREATE_USER=true
      - FORGEJO__repository__DEFAULT_PUSH_CREATE_PRIVATE=false
      # Disable registration (we create admin via CLI)
      - FORGEJO__service__DISABLE_REGISTRATION=true
      # Allow webhooks to local/private IPs (needed for dev)
      - FORGEJO__webhook__ALLOWED_HOST_LIST=*
    ports:
      - "3001:3000"   # Forgejo web UI
      - "2222:22"     # SSH (optional)
    volumes:
      - forgejo-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9003}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-redc-artifacts}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-git-server-repos}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://$$MINIO_ENDPOINT:$$MINIO_PORT "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY"; do
        sleep 1;
      done &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc mb --ignore-existing local/$$GIT_SERVER_S3_BUCKET
      '

  git-server:
    build:
      context: ../../apps/git-server
      dockerfile: docker/gitty/Dockerfile
      args:
        GITTY_REF: ${GITTY_REF:-291bc674c5105ccb00b27273e7772cf6120149d5}
    restart: unless-stopped
    depends_on:
      - minio
      - minio-init
    environment:
      GIT_SERVER_PORT: 8080
      GIT_SERVER_PUBLIC_URL: ${GIT_SERVER_PUBLIC_URL:-http://127.0.0.1:9080}
      GIT_SERVER_S3_ENDPOINT: ${GIT_SERVER_S3_ENDPOINT:-http://minio:9000}
      GIT_SERVER_S3_REGION: ${GIT_SERVER_S3_REGION:-us-east-1}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-git-server-repos}
      GIT_SERVER_S3_PREFIX: ${GIT_SERVER_S3_PREFIX:-repos}
      GIT_SERVER_S3_ACCESS_KEY_ID: ${GIT_SERVER_S3_ACCESS_KEY_ID:-minioadmin}
      GIT_SERVER_S3_SECRET_ACCESS_KEY: ${GIT_SERVER_S3_SECRET_ACCESS_KEY:-minioadmin}
      GIT_SERVER_ADMIN_USERNAME: ${GIT_SERVER_ADMIN_USERNAME:-admin}
      GIT_SERVER_ADMIN_PASSWORD: ${GIT_SERVER_ADMIN_PASSWORD:-admin}
      GIT_SERVER_AUTH_TOKEN_SECRET: ${GIT_SERVER_AUTH_TOKEN_SECRET:-dev-git-server-secret}
    ports:
      - "${GIT_SERVER_PUBLIC_PORT:-9080}:8080"

  api:
    build:
      context: ../..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    depends_on:
      - forgejo
      - minio
      - git-server
    env_file:
      - ../../.env
    environment:
      REDC_PORT: 3000
      REDC_DB_PATH: ${REDC_DB_PATH:-/data/redc-dev.db}
      FORGEJO_URL: ${FORGEJO_URL:-http://forgejo:3000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-secret-123}
      OPENCODE_RUNNER_IMAGE: ${OPENCODE_RUNNER_IMAGE:-redc-claw-runner}
      CLAW_RUNNER_IMAGE: ${CLAW_RUNNER_IMAGE:-${CODEX_RUNNER_IMAGE:-redc-claw-runner}}
      FETCH_REMOTE_AFTER_MERGE: ${FETCH_REMOTE_AFTER_MERGE:-}
      HOST_OPENCODE_DIR: ${HOME}/.local/share/opencode
      HOST_CODEX_DIR: ${HOME}/.codex
      DOCKER_RUN_NETWORK: ${COMPOSE_PROJECT_NAME:-redc}_default
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-redc-artifacts}
      MINIO_PREFIX: ${MINIO_PREFIX:-claw-runs}
    ports:
      - "3000:3000"
    working_dir: /app
    command: >
      sh -lc "bun install --frozen-lockfile &&
      bun run --watch apps/api/index.ts"
    volumes:
      - ../..:/app
      - redc-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - redc-data:/data
      - /tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.local/share/opencode:/root/.local/share/opencode:ro
      - ${HOME}/.codex:/root/.codex:ro

  web:
    image: oven/bun:1-alpine
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /app/apps/web
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    command: >
      sh -lc "cd /app &&
      bun install --frozen-lockfile &&
      cd /app/apps/web &&
      bun run dev --host 0.0.0.0 --port 5173"
    volumes:
      - ../..:/app
      - redc-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules

volumes:
  forgejo-data:
  minio-data:
  redc-data:
  redc-node-modules:
  web-node-modules:
