name: red

services:
  loki:
    container_name: loki
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  s3:
    container_name: s3
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9003}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    volumes:
      - minio-data:/data

  init:
    container_name: init
    image: minio/mc:latest
    depends_on:
      - s3
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-s3}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-red-artifacts}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-grs-repos}
      WIDE_EVENTS_RAW_BUCKET: ${WIDE_EVENTS_RAW_BUCKET:-wide-events-raw}
      WIDE_EVENTS_ROLLUP_BUCKET: ${WIDE_EVENTS_ROLLUP_BUCKET:-wide-events-rollup}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://$$MINIO_ENDPOINT:$$MINIO_PORT "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY"; do
        sleep 1;
      done &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc mb --ignore-existing local/$$GIT_SERVER_S3_BUCKET &&
      mc mb --ignore-existing local/$$WIDE_EVENTS_RAW_BUCKET &&
      mc mb --ignore-existing local/$$WIDE_EVENTS_ROLLUP_BUCKET
      '

  obs:
    container_name: obs
    image: oven/bun:1
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    depends_on:
      - loki
      - s3
      - init
    working_dir: /app/apps/obs
    environment:
      WIDE_EVENTS_HOST: ${WIDE_EVENTS_HOST}
      WIDE_EVENTS_PORT: ${WIDE_EVENTS_PORT}
      WIDE_EVENTS_STORAGE_BACKEND: ${WIDE_EVENTS_STORAGE_BACKEND}
      WIDE_EVENTS_DATA_DIR: ${WIDE_EVENTS_DATA_DIR}
      WIDE_EVENTS_RAW_EVENTS_DIR: ${WIDE_EVENTS_RAW_EVENTS_DIR}
      WIDE_EVENTS_ROLLUP_DIR: ${WIDE_EVENTS_ROLLUP_DIR}
      WIDE_EVENTS_SWEEP_INTERVAL_MS: ${WIDE_EVENTS_SWEEP_INTERVAL_MS}
      WIDE_EVENTS_INCOMPLETE_GRACE_MS: ${WIDE_EVENTS_INCOMPLETE_GRACE_MS}
      WIDE_EVENTS_REPLAY_WINDOW_MS: ${WIDE_EVENTS_REPLAY_WINDOW_MS}
      WIDE_EVENTS_S3_ENDPOINT: ${WIDE_EVENTS_S3_ENDPOINT}
      WIDE_EVENTS_S3_REGION: ${WIDE_EVENTS_S3_REGION}
      WIDE_EVENTS_S3_ACCESS_KEY_ID: ${WIDE_EVENTS_S3_ACCESS_KEY_ID}
      WIDE_EVENTS_S3_SECRET_ACCESS_KEY: ${WIDE_EVENTS_S3_SECRET_ACCESS_KEY}
      WIDE_EVENTS_RAW_BUCKET: ${WIDE_EVENTS_RAW_BUCKET}
      WIDE_EVENTS_RAW_PREFIX: ${WIDE_EVENTS_RAW_PREFIX}
      WIDE_EVENTS_ROLLUP_BUCKET: ${WIDE_EVENTS_ROLLUP_BUCKET}
      WIDE_EVENTS_ROLLUP_PREFIX: ${WIDE_EVENTS_ROLLUP_PREFIX}
      TRIAGE_ENABLED: ${TRIAGE_ENABLED:-false}
      TRIAGE_ENDPOINT_URL: ${TRIAGE_ENDPOINT_URL:-http://triage:7000/v1/runs}
      TRIAGE_MIN_STATUS_CODE: ${TRIAGE_MIN_STATUS_CODE:-500}
      TRIAGE_DEDUP_TTL_MS: ${TRIAGE_DEDUP_TTL_MS:-900000}
      AI_DAEMONS_MEMORY_BACKEND: ${AI_DAEMONS_MEMORY_BACKEND:-r2}
      AI_DAEMONS_MEMORY_REPO: ${AI_DAEMONS_MEMORY_REPO}
      AI_DAEMONS_R2_BUCKET: ${AI_DAEMONS_R2_BUCKET}
      AI_DAEMONS_R2_ENDPOINT: ${AI_DAEMONS_R2_ENDPOINT}
      AI_DAEMONS_R2_REGION: ${AI_DAEMONS_R2_REGION:-auto}
      AI_DAEMONS_R2_ACCESS_KEY_ID: ${AI_DAEMONS_R2_ACCESS_KEY_ID}
      AI_DAEMONS_R2_SECRET_ACCESS_KEY: ${AI_DAEMONS_R2_SECRET_ACCESS_KEY}
      AI_DAEMONS_MEMORY_PREFIX: ${AI_DAEMONS_MEMORY_PREFIX:-daemon-memory/v1}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${WIDE_EVENTS_PORT}:4090"
    command: ["bun", "run", "--watch", "src/index.ts"]
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:4090/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  grs:
    container_name: grs
    init: true
    stop_grace_period: 2s
    build:
      context: ../../apps/grs
      dockerfile: docker/gitty/Dockerfile
      args:
        GITTY_REF: ${GITTY_REF:-291bc674c5105ccb00b27273e7772cf6120149d5}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      - loki
      - s3
      - init
    environment:
      GIT_SERVER_PORT: 8080
      GIT_SERVER_PUBLIC_URL: ${GIT_SERVER_PUBLIC_URL:-http://127.0.0.1:9080}
      GIT_SERVER_S3_ENDPOINT: ${GIT_SERVER_S3_ENDPOINT:-http://s3:9000}
      GIT_SERVER_S3_REGION: ${GIT_SERVER_S3_REGION:-us-east-1}
      GIT_SERVER_S3_BUCKET: ${GIT_SERVER_S3_BUCKET:-grs-repos}
      GIT_SERVER_S3_PREFIX: ${GIT_SERVER_S3_PREFIX:-repos}
      GIT_SERVER_S3_ACCESS_KEY_ID: ${GIT_SERVER_S3_ACCESS_KEY_ID:-minioadmin}
      GIT_SERVER_S3_SECRET_ACCESS_KEY: ${GIT_SERVER_S3_SECRET_ACCESS_KEY:-minioadmin}
      GIT_SERVER_ADMIN_USERNAME: ${GIT_SERVER_ADMIN_USERNAME:-admin}
      GIT_SERVER_ADMIN_PASSWORD: ${GIT_SERVER_ADMIN_PASSWORD:-admin}
      GIT_SERVER_AUTH_TOKEN_SECRET: ${GIT_SERVER_AUTH_TOKEN_SECRET:-dev-git-server-secret}
      OBS_SINK_MODE: ${OBS_SINK_MODE:-collector}
      WIDE_EVENTS_COLLECTOR_URL: ${WIDE_EVENTS_COLLECTOR_URL:-http://obs:4090}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${GIT_SERVER_PUBLIC_PORT:-9080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-auth:
    container_name: db-auth
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_lab}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_lab}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_lab_password}
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth_lab} -d ${AUTH_DB_NAME:-auth_lab}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    container_name: auth
    image: oven/bun:1-alpine
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
      db-auth:
        condition: service_healthy
      obs:
        condition: service_healthy
    working_dir: /app/apps/auth
    environment:
      AUTH_LAB_HOST: 0.0.0.0
      AUTH_LAB_PORT: 4020
      AUTH_LAB_ISSUER: ${AUTH_ISSUER:-http://localhost:4020}
      AUTH_LAB_AUDIENCE: ${AUTH_AUDIENCE:-red-api}
      AUTH_LAB_WEB_CLIENTS: ${AUTH_WEB_CLIENTS:-red-web=http://localhost:5173}
      AUTH_LAB_PASSKEY_ORIGINS: ${AUTH_PASSKEY_ORIGINS:-http://localhost:5173}
      AUTH_LAB_PASSKEY_RP_IDS: ${AUTH_PASSKEY_RP_IDS:-localhost}
      AUTH_LAB_STEALTH_TOTP_EMAILS: ${AUTH_LAB_STEALTH_TOTP_EMAILS:-douglasjbinder@gmail.com}
      AUTH_LAB_STEALTH_TOTP_SEED_EMAIL: ${AUTH_LAB_STEALTH_TOTP_SEED_EMAIL:-douglasjbinder@gmail.com}
      AUTH_LAB_STEALTH_TOTP_SEED_NAME: ${AUTH_LAB_STEALTH_TOTP_SEED_NAME:-Douglas Binder}
      AUTH_LAB_STEALTH_TOTP_SEED_SECRET: ${AUTH_LAB_STEALTH_TOTP_SEED_SECRET:-JBSWY3DPEHPK3PXP}
      AUTH_LAB_ALLOW_ANY_TOTP_CODE: ${AUTH_ALLOW_ANY_TOTP_CODE:-true}
      AUTH_LAB_DB_URL: postgres://${AUTH_DB_USER:-auth_lab}:${AUTH_DB_PASSWORD:-auth_lab_password}@db-auth:5432/${AUTH_DB_NAME:-auth_lab}
      AUTH_LAB_BETTER_AUTH_SECRET: ${AUTH_BETTER_AUTH_SECRET:-auth-lab-compose-secret}
      AUTH_LAB_SIGNING_PRIVATE_JWK_FILE: /run/config/signing-key.private.jwk
      AUTH_LAB_BOOTSTRAP_CLIENT_ID: ${AUTH_BOOTSTRAP_CLIENT_ID:-claw-runner-compose}
      AUTH_LAB_BOOTSTRAP_CLIENT_SECRET: ${AUTH_BOOTSTRAP_CLIENT_SECRET:-auth-lab-compose-client-secret}
      AUTH_LAB_BOOTSTRAP_SCOPES: ${AUTH_BOOTSTRAP_SCOPES:-prs:create changes:read}
      AUTH_LAB_BOOTSTRAP_AUDIENCES: ${AUTH_BOOTSTRAP_AUDIENCES:-red-api}
      AUTH_LAB_BOOTSTRAP_TTL_SECONDS: ${AUTH_BOOTSTRAP_TTL_SECONDS:-300}
      AUTH_LAB_EXPOSE_TEST_MAILBOX: ${AUTH_EXPOSE_TEST_MAILBOX:-true}
      OBS_SINK_MODE: ${OBS_SINK_MODE:-collector}
      WIDE_EVENTS_COLLECTOR_URL: ${WIDE_EVENTS_COLLECTOR_URL:-http://obs:4090}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${AUTH_PORT:-4020}:4020"
    command: ["bun", "run", "dev"]
    volumes:
      - ../..:/app
      - auth-node-modules:/app/apps/auth/node_modules
      - ../../apps/auth/compose/signing-key.private.jwk:/run/config/signing-key.private.jwk:ro
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:4020/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  ctl:
    container_name: ctl
    init: true
    stop_grace_period: 2s
    build:
      context: ../..
      dockerfile: infra/base/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      - loki
      - s3
      - grs
      - obs
    env_file:
      - ../../.env
    environment:
      RED_PORT: 3000
      RED_DB_PATH: ${RED_DB_PATH:-/data/red-dev.db}
      RED_REPOS: ${RED_REPOS:-bind/red}
      GIT_STORAGE_PUBLIC_URL: ${GIT_STORAGE_PUBLIC_URL:-http://grs:8080}
      GIT_STORAGE_DEFAULT_OWNER: ${GIT_STORAGE_DEFAULT_OWNER:-red}
      GIT_STORAGE_CONTROL_PLANE_URL: ${GIT_STORAGE_CONTROL_PLANE_URL:-http://grs:8080}
      GIT_STORAGE_CONTROL_PLANE_USERNAME: ${GIT_STORAGE_CONTROL_PLANE_USERNAME:-admin}
      GIT_STORAGE_CONTROL_PLANE_PASSWORD: ${GIT_STORAGE_CONTROL_PLANE_PASSWORD:-admin}
      GIT_SERVER_ADMIN_USERNAME: ${GIT_SERVER_ADMIN_USERNAME:-admin}
      GIT_SERVER_ADMIN_PASSWORD: ${GIT_SERVER_ADMIN_PASSWORD:-admin}
      OPENCODE_RUNNER_IMAGE: ${OPENCODE_RUNNER_IMAGE:-${CODEX_RUNNER_IMAGE:-red-claw-runner}}
      FETCH_REMOTE_AFTER_MERGE: ${FETCH_REMOTE_AFTER_MERGE:-}
      HOST_OPENCODE_DIR: ${HOME}/.local/share/opencode
      HOST_CODEX_DIR: ${HOME}/.codex
      DOCKER_RUN_NETWORK: ${COMPOSE_PROJECT_NAME:-red}_default
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-s3}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-red-artifacts}
      MINIO_PREFIX: ${MINIO_PREFIX:-claw-runs}
      OBS_SINK_MODE: ${OBS_SINK_MODE:-collector}
      WIDE_EVENTS_COLLECTOR_URL: ${WIDE_EVENTS_COLLECTOR_URL:-http://obs:4090}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3000:3000"
    working_dir: /app
    command: ["bun", "run", "--watch", "apps/ctl/index.ts"]
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules
      - red-data:/data
      - /tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.local/share/opencode:/root/.local/share/opencode:ro
      - ${HOME}/.codex:/root/.codex:ro
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:3000/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  bff:
    container_name: bff
    image: oven/bun:1-alpine
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    depends_on:
      - loki
      - ctl
      - auth
      - obs
    working_dir: /app
    environment:
      BFF_PORT: 3001
      RED_API_BASE_URL: http://ctl:3000
      AUTH_BASE_URL: http://auth:4020
      OBS_BASE_URL: http://obs:4090
      TRIAGE_BASE_URL: http://triage:7000
      BFF_DISABLE_AUTH: ${BFF_DISABLE_AUTH:-true}
      BFF_HOSTED_REPO_ID: ${BFF_HOSTED_REPO_ID:-bind/red}
      BFF_HOSTED_REPO_ACTOR_ID: ${BFF_HOSTED_REPO_ACTOR_ID:-red-bff-hosted-repo}
      BFF_HOSTED_REPO_DEFAULT_BRANCH: ${BFF_HOSTED_REPO_DEFAULT_BRANCH:-main}
      BFF_HOSTED_REPO_README_PATH: ${BFF_HOSTED_REPO_README_PATH:-README.md}
      BFF_HOSTED_REPO_TOKEN_TTL_SECONDS: ${BFF_HOSTED_REPO_TOKEN_TTL_SECONDS:-300}
      BFF_HOSTED_REPO_TOKEN_REFRESH_WINDOW_SECONDS: ${BFF_HOSTED_REPO_TOKEN_REFRESH_WINDOW_SECONDS:-30}
      BFF_GIT_STORAGE_PUBLIC_URL: ${BFF_GIT_STORAGE_PUBLIC_URL:-http://grs:8080}
      BFF_GIT_STORAGE_TOKEN_SECRET: ${BFF_GIT_STORAGE_TOKEN_SECRET:-dev-git-server-secret}
      OBS_SINK_MODE: ${OBS_SINK_MODE:-collector}
      WIDE_EVENTS_COLLECTOR_URL: ${WIDE_EVENTS_COLLECTOR_URL:-http://obs:4090}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3001:3001"
    command: ["bun", "run", "--watch", "apps/bff/src/index.ts"]
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:3001/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    container_name: web
    image: oven/bun:1-alpine
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    depends_on:
      - bff
    working_dir: /app/apps/web
    environment:
      VITE_API_PROXY_TARGET: http://bff:3001
      VITE_DEV_AUTO_LOGIN_EMAIL: ${VITE_DEV_AUTO_LOGIN_EMAIL:-douglasjbinder@gmail.com}
      VITE_DEV_AUTO_LOGIN_CODE: ${VITE_DEV_AUTO_LOGIN_CODE:-000000}
    ports:
      - "5173:5173"
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5173"]
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules

  triage:
    container_name: triage
    image: oven/bun:1-alpine
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    depends_on:
      - loki
    working_dir: /app/apps/triage
    environment:
      TRIAGE_PORT: ${TRIAGE_PORT:-7000}
      TRIAGE_WORKFLOW_MODE: ${TRIAGE_WORKFLOW_MODE:-stub}
      TRIAGE_SMITHERS_BASE_URL: ${TRIAGE_SMITHERS_BASE_URL:-http://triage-smithers:7331}
      TRIAGE_WORKFLOW_PATH: ${TRIAGE_WORKFLOW_PATH:-/app/apps/triage/src/workflows/triage.tsx}
      TRIAGE_SMITHERS_DB_PATH: ${TRIAGE_SMITHERS_DB_PATH:-/smithers-data/smithers.db}
      TRIAGE_AGENT_MODE: ${TRIAGE_AGENT_MODE:-subscription}
      TRIAGE_SUBSCRIPTION_MODEL: ${TRIAGE_SUBSCRIPTION_MODEL:-gpt-5.3-codex}
      TRIAGE_SUBSCRIPTION_REASONING_EFFORT: ${TRIAGE_SUBSCRIPTION_REASONING_EFFORT:-high}
      TRIAGE_OPENAI_BASE_URL: ${TRIAGE_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      TRIAGE_OPENAI_API_KEY: ${TRIAGE_OPENAI_API_KEY:-}
      TRIAGE_OPENAI_MODEL: ${TRIAGE_OPENAI_MODEL:-anthropic/claude-sonnet-4.5}
      TRIAGE_OPENAI_PROVIDER_NAME: ${TRIAGE_OPENAI_PROVIDER_NAME:-openrouter}
      TRIAGE_OPENAI_TITLE: ${TRIAGE_OPENAI_TITLE:-red}
      TRIAGE_OPENAI_REFERER: ${TRIAGE_OPENAI_REFERER:-}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      SMITHERS_API_KEY: ${SMITHERS_API_KEY:-}
      RED_API_BASE_URL: ${RED_API_BASE_URL:-http://ctl:3000}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${TRIAGE_PORT:-7000}:7000"
    command: >
      sh -lc "apk add --no-cache ca-certificates &&
      cd /app/apps/triage &&
      exec bun run --watch src/index.ts"
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
      - smithers-data:/smithers-data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:7000/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
  triage-smithers:
    container_name: triage-smithers
    image: oven/bun:1-alpine
    init: true
    stop_grace_period: 2s
    restart: unless-stopped
    working_dir: /app/apps/triage
    environment:
      SMITHERS_SERVER_PORT: 7331
      SMITHERS_API_KEY: ${SMITHERS_API_KEY:-}
      SMITHERS_DB_PATH: /smithers-data/smithers.db
      SMITHERS_ROOT_DIR: /app
      SMITHERS_ALLOW_NETWORK: ${SMITHERS_ALLOW_NETWORK:-true}
      TRIAGE_AGENT_MODE: ${TRIAGE_AGENT_MODE:-subscription}
      TRIAGE_SUBSCRIPTION_MODEL: ${TRIAGE_SUBSCRIPTION_MODEL:-gpt-5.3-codex}
      TRIAGE_SUBSCRIPTION_REASONING_EFFORT: ${TRIAGE_SUBSCRIPTION_REASONING_EFFORT:-high}
      TRIAGE_OPENAI_BASE_URL: ${TRIAGE_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      TRIAGE_OPENAI_API_KEY: ${TRIAGE_OPENAI_API_KEY:-}
      TRIAGE_OPENAI_MODEL: ${TRIAGE_OPENAI_MODEL:-anthropic/claude-sonnet-4.5}
      TRIAGE_OPENAI_PROVIDER_NAME: ${TRIAGE_OPENAI_PROVIDER_NAME:-openrouter}
      TRIAGE_OPENAI_TITLE: ${TRIAGE_OPENAI_TITLE:-red}
      TRIAGE_OPENAI_REFERER: ${TRIAGE_OPENAI_REFERER:-}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
    ports:
      - "${SMITHERS_SERVER_PORT:-7331}:7331"
    command: >
      sh -lc "apk add --no-cache ca-certificates npm &&
      npm install -g @openai/codex@0.117.0 &&
      cd /app/apps/triage &&
      exec bun run src/smithers-server.ts"
    volumes:
      - ../..:/app
      - red-node-modules:/app/node_modules
      - smithers-data:/smithers-data
      - ${HOME}/.codex:/root/.codex:ro
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const response = await fetch('http://127.0.0.1:7331/health'); if (!response.ok) throw new Error('healthcheck failed: ' + response.status);",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles: ["triage"]

volumes:
  minio-data:
  loki-data:
  red-data:
  red-node-modules:
  web-node-modules:
  auth-node-modules:
  smithers-data:
