services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${WIDE_EVENTS_S3_ACCESS_KEY_ID:?set WIDE_EVENTS_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${WIDE_EVENTS_S3_SECRET_ACCESS_KEY:?set WIDE_EVENTS_S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${WIDE_EVENTS_S3_API_PORT:-9010}:9000"
      - "${WIDE_EVENTS_S3_CONSOLE_PORT:-9011}:9001"
    volumes:
      - wide-events-minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      WIDE_EVENTS_S3_ENDPOINT: ${WIDE_EVENTS_S3_ENDPOINT:-http://minio:9000}
      WIDE_EVENTS_S3_ACCESS_KEY_ID: ${WIDE_EVENTS_S3_ACCESS_KEY_ID:?set WIDE_EVENTS_S3_ACCESS_KEY_ID}
      WIDE_EVENTS_S3_SECRET_ACCESS_KEY: ${WIDE_EVENTS_S3_SECRET_ACCESS_KEY:?set WIDE_EVENTS_S3_SECRET_ACCESS_KEY}
      WIDE_EVENTS_RAW_BUCKET: ${WIDE_EVENTS_RAW_BUCKET:-wide-events-raw}
      WIDE_EVENTS_ROLLUP_BUCKET: ${WIDE_EVENTS_ROLLUP_BUCKET:-wide-events-rollup}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local "$$WIDE_EVENTS_S3_ENDPOINT" "$$WIDE_EVENTS_S3_ACCESS_KEY_ID" "$$WIDE_EVENTS_S3_SECRET_ACCESS_KEY"; do
        sleep 1;
      done &&
      mc mb --ignore-existing local/$$WIDE_EVENTS_RAW_BUCKET &&
      mc mb --ignore-existing local/$$WIDE_EVENTS_ROLLUP_BUCKET
      '

  collector:
    image: oven/bun:1-alpine
    depends_on:
      - minio
      - minio-init
    working_dir: /app/experiments/wide-events-lab
    environment:
      WIDE_EVENTS_LAB_HOST: 0.0.0.0
      WIDE_EVENTS_LAB_PORT: 4090
      WIDE_EVENTS_STORAGE_BACKEND: minio
      WIDE_EVENTS_S3_ENDPOINT: ${WIDE_EVENTS_S3_ENDPOINT:-http://minio:9000}
      WIDE_EVENTS_S3_REGION: ${WIDE_EVENTS_S3_REGION:-us-east-1}
      WIDE_EVENTS_S3_ACCESS_KEY_ID: ${WIDE_EVENTS_S3_ACCESS_KEY_ID:?set WIDE_EVENTS_S3_ACCESS_KEY_ID}
      WIDE_EVENTS_S3_SECRET_ACCESS_KEY: ${WIDE_EVENTS_S3_SECRET_ACCESS_KEY:?set WIDE_EVENTS_S3_SECRET_ACCESS_KEY}
      WIDE_EVENTS_RAW_BUCKET: ${WIDE_EVENTS_RAW_BUCKET:-wide-events-raw}
      WIDE_EVENTS_RAW_PREFIX: ${WIDE_EVENTS_RAW_PREFIX:-raw}
      WIDE_EVENTS_ROLLUP_BUCKET: ${WIDE_EVENTS_ROLLUP_BUCKET:-wide-events-rollup}
      WIDE_EVENTS_ROLLUP_PREFIX: ${WIDE_EVENTS_ROLLUP_PREFIX:-rollup}
      WIDE_EVENTS_LAB_INCOMPLETE_GRACE_MS: ${WIDE_EVENTS_LAB_INCOMPLETE_GRACE_MS:-60000}
      WIDE_EVENTS_LAB_SWEEP_INTERVAL_MS: ${WIDE_EVENTS_LAB_SWEEP_INTERVAL_MS:-5000}
    command: >
      sh -lc "cd /app &&
      bun install --frozen-lockfile &&
      cd /app/experiments/wide-events-lab &&
      bun run src/index.ts"
    ports:
      - "${WIDE_EVENTS_LAB_PORT:-4090}:4090"
    volumes:
      - ../..:/app
      - wide-events-node-modules:/app/node_modules

volumes:
  wide-events-minio-data:
  wide-events-node-modules:
