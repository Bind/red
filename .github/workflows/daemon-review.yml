name: Daemon review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  daemon-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 20
    steps:
      - name: Checkout trusted base repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout PR contents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          fetch-depth: 1
          persist-credentials: false

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Configure Codex auth
        run: |
          mkdir -p "$HOME/.codex"
          auth_json_base64="$(dotenvx get CODEX_AUTH_JSON_BASE64 -f .env.ci --format shell || true)"
          auth_json="$(dotenvx get CODEX_AUTH_JSON -f .env.ci --format shell || true)"
          if [ -n "$auth_json_base64" ]; then
            printf '%s' "$auth_json_base64" | base64 --decode > "$HOME/.codex/auth.json"
          elif [ -n "$auth_json" ]; then
            printf '%s' "$auth_json" > "$HOME/.codex/auth.json"
          else
            echo "CODEX_AUTH_JSON_BASE64 or CODEX_AUTH_JSON is required" >&2
            exit 1
          fi
          chmod 600 "$HOME/.codex/auth.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run daemon review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_ROOT: ${{ github.workspace }}/pr-head
        run: dotenvx run -f .env.ci -- bun run workflows/daemon-review/src/main.ts
