name: Daemon review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  daemon-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 20
    steps:
      - name: Checkout trusted base repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-base
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout PR contents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          fetch-depth: 1
          persist-credentials: false

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Install dependencies
        working-directory: trusted-base
        run: bun install --frozen-lockfile

      - name: Run daemon review
        working-directory: trusted-base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_ROOT: ${{ github.workspace }}/pr-head
          DAEMON_REVIEW_MAX_PARALLEL: "3"
          DAEMON_REVIEW_PROPOSAL_MODE: "true"
          DAEMON_REVIEW_ROUTER_MODE: "memory_embedding_librarian"
          DAEMON_REVIEW_ROUTER_PROVIDER: openrouter
          DAEMON_REVIEW_ROUTER_MODEL: openai/text-embedding-3-small
          DAEMON_REVIEW_LIBRARIAN_MODEL: deepseek/deepseek-v4-flash
          DAEMON_REVIEW_ROUTER_SCORE_THRESHOLD: "0.45"
          DAEMON_REVIEW_ROUTER_MAX_GAP: "0.08"
          DAEMON_REVIEW_ROUTER_TOP_K: "3"
          AI_DAEMONS_PROVIDER: openrouter
          AI_DAEMONS_MODEL: deepseek/deepseek-v4-flash
          AI_DAEMONS_MEMORY_BACKEND: r2
          AI_DAEMONS_MEMORY_REPO: ${{ github.repository }}
        run: dotenvx run -f .env.ci -- bun run workflows/daemon-review/src/main.ts
