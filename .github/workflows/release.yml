name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

env:
  JUST_UNSTABLE: "1"
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  build-images:
    name: build release images
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      git_commit: ${{ github.sha }}
      image_tag: ${{ github.sha }}
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  release:
    name: provision + deploy + health check
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Provision infra
        run: dotenvx run -f .env.ci -- just provision production .env.ci

      - name: Configure SSH (private key from .env.ci)
        run: |
          mkdir -p ~/.ssh
          key="$(dotenvx get HETZNER_SSH_PRIVATE_KEY -f .env.ci --format shell)"
          if printf "%s" "$key" | grep -q "^-----BEGIN "; then
            printf "%s\n" "$key" > ~/.ssh/id_ed25519
          else
            printf "%s" "$key" | openssl base64 -d -A > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy code (rsync + docker compose up)
        run: just deploy-ssh "${{ github.event.release.tag_name }}" "${{ github.sha }}" red.computer 2222

      - name: Post-deploy health check
        run: just deploy-check https://red.computer
