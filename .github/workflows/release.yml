name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

env:
  JUST_UNSTABLE: "1"
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  release:
    name: sst deploy + ssh deploy + health check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Provision infra (sst deploy)
        run: dotenvx run -f .env.ci -- just deploy-infra production

      - name: Configure SSH (private key from .env.ci)
        run: |
          mkdir -p ~/.ssh
          dotenvx run -f .env.ci -- sh -c 'printf "%s\n" "$HETZNER_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519'
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy code (rsync + docker compose up)
        run: just deploy-ssh red.computer 2222

      - name: Post-deploy health check
        run: just deploy-check https://red.computer
