name: Release

on:
  release:
    types: [published]

# Release creation is restricted by repo permissions — that IS the
# human-in-the-loop gate. Serialise runs so a rapid second release
# can't race against the first.
concurrency:
  group: release
  cancel-in-progress: false

env:
  JUST_UNSTABLE: "1"

jobs:
  release:
    name: sst deploy + ssh deploy + health check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Provision infra (sst deploy)
        run: just deploy-infra production

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy code (rsync + docker compose up)
        run: just deploy-ssh red.computer 2222

      - name: Post-deploy health check
        run: just deploy-check https://red.computer
