name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

concurrency:
  group: preview-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JUST_UNSTABLE: "1"
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  build-images:
    name: build preview images
    if: github.event.action != 'closed' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      git_commit: ${{ github.event.pull_request.head.sha }}
      image_tag: ${{ github.event.pull_request.head.sha }}
      runner_label: ubuntu-24.04-arm
      platforms: linux/arm64
      enable_qemu: false
    secrets: inherit

  deploy:
    name: deploy preview
    if: github.event.action != 'closed' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun download/install state
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock', 'package.json', 'apps/**/package.json', 'pkg/**/package.json', 'workflows/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - name: Cache Turbo local artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-preview-${{ hashFiles('bun.lock', 'package.json', 'turbo.json', 'apps/**/package.json', 'pkg/**/package.json', 'workflows/**/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-preview-${{ hashFiles('bun.lock', 'package.json', 'turbo.json', 'apps/**/package.json', 'pkg/**/package.json', 'workflows/**/package.json') }}-
            ${{ runner.os }}-turbo-preview-

      - uses: extractions/setup-just@v2

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Turbo build smoke
        env:
          TURBO_TELEMETRY_DISABLED: "1"
        run: bunx turbo run build --affected

      - name: Turbo typecheck lane
        env:
          TURBO_TELEMETRY_DISABLED: "1"
        run: bunx turbo run typecheck --affected

      - name: Ensure wildcard preview DNS exists
        run: dotenvx run -f .env.ci -- just deploy-infra dev

      - name: Configure SSH (dev key from .env.ci)
        run: |
          mkdir -p ~/.ssh
          key="$(dotenvx get DEV_SSH_PRIVATE_KEY -f .env.ci --format shell)"
          if printf "%s" "$key" | grep -q "^-----BEGIN "; then
            printf "%s\n" "$key" > ~/.ssh/id_ed25519
          else
            printf "%s" "$key" | openssl base64 -d -A > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve dev server IP from SST outputs
        id: dev-ip
        run: echo "host=$(jq -r '.serverIp' .sst/outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        run: just deploy-preview "pr-${{ github.event.pull_request.number }}" "${{ steps.dev-ip.outputs.host }}" "${{ github.event.pull_request.head.sha }}" "${{ github.event.pull_request.head.sha }}" 2222

      - name: Health check
        run: just preview-check "pr-${{ github.event.pull_request.number }}"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            Preview deployed: https://pr-${{ github.event.pull_request.number }}.preview.red.computer

            Updated at commit `${{ github.event.pull_request.head.sha }}`.

  teardown:
    name: teardown preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Configure SSH (dev key from .env.ci)
        run: |
          mkdir -p ~/.ssh
          key="$(dotenvx get DEV_SSH_PRIVATE_KEY -f .env.ci --format shell)"
          if printf "%s" "$key" | grep -q "^-----BEGIN "; then
            printf "%s\n" "$key" > ~/.ssh/id_ed25519
          else
            printf "%s" "$key" | openssl base64 -d -A > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve dev server IP from SST outputs
        id: dev-ip
        run: |
          dotenvx run -f .env.ci -- just deploy-infra dev
          echo "host=$(jq -r '.serverIp' .sst/outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Tear down preview
        run: just teardown-preview "pr-${{ github.event.pull_request.number }}" "${{ steps.dev-ip.outputs.host }}" 2222

      - name: Comment teardown on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            Preview torn down.
