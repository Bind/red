name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

# Shared dev box → only one deploy/teardown should touch it at a time.
# Cancel-in-progress so the latest PR push supersedes earlier in-flight
# deploys; teardown still runs to completion if it starts.
concurrency:
  group: preview-deploy
  cancel-in-progress: true

env:
  JUST_UNSTABLE: "1"

jobs:
  deploy:
    name: deploy preview
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_SSH_PUBLIC_KEY: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      DEV_SERVER_IP: ${{ secrets.DEV_SERVER_IP }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Ensure wildcard preview DNS exists
        run: just deploy-infra dev

      - name: Configure SSH (dev key)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy preview
        run: just deploy-preview "pr-${{ github.event.pull_request.number }}" "${{ secrets.DEV_SERVER_IP }}" 2222

      - name: Health check
        run: just preview-check "pr-${{ github.event.pull_request.number }}"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            Preview deployed: https://pr-${{ github.event.pull_request.number }}.preview.red.computer

            Updated at commit `${{ github.event.pull_request.head.sha }}`.

  teardown:
    name: teardown preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - name: Configure SSH (dev key)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Tear down preview
        run: just teardown-preview "pr-${{ github.event.pull_request.number }}" "${{ secrets.DEV_SERVER_IP }}" 2222

      - name: Comment teardown on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            Preview torn down.
