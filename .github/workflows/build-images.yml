name: Build images

on:
  workflow_call:
    inputs:
      git_commit:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      release_tag:
        required: false
        type: string

jobs:
  build:
    name: Build and push ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: red-gateway
            context: infra/gateway
            dockerfile: infra/gateway/Dockerfile
          - image_name: red-api
            context: .
            dockerfile: infra/Dockerfile
          - image_name: red-bff
            context: .
            dockerfile: apps/bff/Dockerfile
          - image_name: red-auth
            context: apps/auth
            dockerfile: apps/auth/Dockerfile
          - image_name: red-obs
            context: .
            dockerfile: apps/obs/Dockerfile
          - image_name: red-grs
            context: apps/grs
            dockerfile: apps/grs/docker/gitty/Dockerfile
          - image_name: red-triage
            context: .
            dockerfile: apps/triage/Dockerfile
          - image_name: red-web
            context: .
            dockerfile: apps/web/Dockerfile
          - image_name: red-mcp
            context: .
            dockerfile: apps/mcp/Dockerfile

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_commit }}
          fetch-depth: 0

      - name: Lowercase registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          set -euo pipefail
          image="ghcr.io/${OWNER}/${IMAGE_NAME}"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${IMAGE_TAG}"
            if [ -n "${RELEASE_TAG}" ]; then
              echo "${image}:${RELEASE_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_COMMIT=${{ inputs.git_commit }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
