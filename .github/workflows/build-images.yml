name: Build images

on:
  workflow_call:
    inputs:
      git_commit:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      release_tag:
        required: false
        type: string
      runner_label:
        required: false
        default: ubuntu-latest
        type: string
      platforms:
        required: false
        default: linux/amd64,linux/arm64
        type: string
      enable_qemu:
        required: false
        default: true
        type: boolean

jobs:
  workspace_deps:
    name: Build shared workspace deps
    runs-on: ${{ inputs.runner_label }}
    permissions:
      contents: read
      packages: write
    outputs:
      alpine_image: ${{ steps.meta.outputs.alpine_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_commit }}
          fetch-depth: 0

      - name: Lowercase registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        if: ${{ inputs.enable_qemu }}
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute deps image tags
        id: meta
        env:
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          set -euo pipefail
          manifest_hash="$(
            {
              sha256sum package.json bun.lock
              find apps pkg workflows -name package.json -print0 | sort -z | xargs -0 sha256sum
            } | sha256sum | cut -d' ' -f1
          )"
          alpine_image="ghcr.io/${OWNER}/red-workspace-deps-alpine:${manifest_hash}"
          {
            echo "alpine_image=${alpine_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push alpine workspace deps
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/base/Dockerfile.workspace-deps
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.alpine_image }}
          build-args: |
            BUN_IMAGE=oven/bun:1.3.10-alpine
          cache-from: |
            type=gha,scope=workspace-deps-alpine
            type=registry,ref=${{ steps.meta.outputs.alpine_image }}
          cache-to: |
            type=gha,mode=max,scope=workspace-deps-alpine

  build:
    name: Build and push ${{ matrix.image_name }}
    needs: workspace_deps
    runs-on: ${{ inputs.runner_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: red-gateway
            context: infra/platform/gateway
            dockerfile: infra/platform/gateway/Dockerfile
            workspace_deps_flavor: none
          - image_name: red-api
            context: .
            dockerfile: infra/base/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-bff
            context: .
            dockerfile: apps/bff/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-auth
            context: .
            dockerfile: apps/auth/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-obs
            context: .
            dockerfile: apps/obs/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-grs
            context: apps/grs
            dockerfile: apps/grs/docker/gitty/Dockerfile
            workspace_deps_flavor: none
          - image_name: red-triage
            context: .
            dockerfile: apps/triage/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-web
            context: .
            dockerfile: apps/web/Dockerfile
            workspace_deps_flavor: alpine
          - image_name: red-mcp
            context: .
            dockerfile: apps/mcp/Dockerfile
            workspace_deps_flavor: alpine

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_commit }}
          fetch-depth: 0

      - name: Lowercase registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        if: ${{ inputs.enable_qemu }}
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          set -euo pipefail
          image="ghcr.io/${OWNER}/${IMAGE_NAME}"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${IMAGE_TAG}"
            if [ -n "${RELEASE_TAG}" ]; then
              echo "${image}:${RELEASE_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GIT_COMMIT=${{ inputs.git_commit }}
            WORKSPACE_DEPS_IMAGE=${{ needs.workspace_deps.outputs.alpine_image }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
