name: Service health

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

env:
  JUST_UNSTABLE: "1"

jobs:
  contract:
    name: Health contract (in-process)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: extractions/setup-just@v2
      - name: Install
        run: bun install --frozen-lockfile
      - name: Health-contract tests
        run: just ci-health-contract "${{ github.event.pull_request.head.sha || github.sha }}"
