name: PR pattern review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

jobs:
  pr-pattern-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Checkout trusted base repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout PR contents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          fetch-depth: 1
          persist-credentials: false

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.sh | sh

      - name: Install Codex CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/codex" <<'EOF'
          #!/usr/bin/env bash
          exec bunx --yes @openai/codex@0.117.0 "$@"
          EOF
          chmod +x "$HOME/.local/bin/codex"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure Codex auth
        run: dotenvx run -f .env.ci -- ./infra/ci/setup-codex-auth.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run PR pattern review
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_ROOT: ${{ github.workspace }}/pr-head
        run: dotenvx run -f .env.ci -- bun run workflows/pr-pattern-review/src/main.ts
